<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Intelligence Lab 數位解碼任務</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+TC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --primary: #FF3366;
            --secondary: #00C2FF;
            --accent: #FFD500;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #333;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1, h2, h3, .font-cute { font-family: 'Fredoka', 'Noto Sans TC', sans-serif; }
        .font-mono { font-family: 'Space Mono', monospace; }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        .btn-game {
            background: linear-gradient(135deg, #FF3366 0%, #FF7733 100%);
            color: white;
            border-radius: 999px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 6px 0 #D01140, 0 10px 20px rgba(255, 51, 102, 0.3);
            transition: all 0.1s;
        }
        .btn-game:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #D01140, 0 15px 25px rgba(255, 51, 102, 0.4); }
        .btn-game:active { transform: translateY(6px); box-shadow: 0 0px 0 #D01140, 0 2px 5px rgba(255, 51, 102, 0.3); }

        .input-cute {
            background: white;
            border: 3px solid #E2E8F0;
            border-radius: 1rem;
            color: #333;
            font-weight: bold;
            transition: all 0.3s;
        }
        .input-cute:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 4px rgba(0, 194, 255, 0.2); }

        /* 排行榜捲軸 */
        .leaderboard-scroll {
            max-height: 200px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #CBD5E1 transparent;
        }
        .leaderboard-scroll::-webkit-scrollbar { width: 6px; }
        .leaderboard-scroll::-webkit-scrollbar-thumb { background-color: #CBD5E1; border-radius: 10px; }

        .bit-switch {
            width: 45px; height: 60px;
            background-color: #F1F5F9;
            border: 3px solid #CBD5E1;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: inset 0 -4px 0 #E2E8F0;
        }
        .bit-switch.on { background-color: var(--secondary); border-color: #0099CC; box-shadow: inset 0 4px 0 #0099CC; transform: translateY(2px); }
        .bit-switch.on .bit-led { background-color: white; box-shadow: 0 0 10px white; }
        .bit-led { width: 20px; height: 10px; background-color: #94A3B8; border-radius: 99px; transition: all 0.2s; }

        .hidden { display: none !important; }

        .video-container {
            position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 1rem; border: 4px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .shape { position: fixed; z-index: -1; opacity: 0.5; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">
    
    <div class="shape bg-yellow-300 w-32 h-32 rounded-full blur-2xl top-10 left-10"></div>
    <div class="shape bg-pink-400 w-48 h-48 rounded-full blur-3xl bottom-20 right-10"></div>

    <header class="p-4 sticky top-0 z-40 hidden" id="top-nav">
        <div class="max-w-4xl mx-auto glass-card px-6 py-3 flex justify-between items-center">
            <div class="font-cute text-2xl font-bold text-pink-500 flex items-center gap-2">🎮 <span class="hidden sm:inline">MINERVA LAB</span></div>
            <div class="flex items-center space-x-4 text-sm font-bold text-gray-700">
                <div class="bg-white/80 px-3 py-1 rounded-full shadow-sm">👤 <span id="nav-agent-name" class="text-blue-600">---</span></div>
                <div class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full shadow-sm border border-yellow-300">⏱️ <span id="nav-time" class="font-mono">00:00</span></div>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4 z-10 relative">
        
        <!-- 首頁與排行榜 -->
        <section id="stage-0" class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
            <!-- 登入卡片 -->
            <div class="glass-card p-8 text-center relative overflow-hidden h-full">
                <div class="mb-6 relative z-10">
                    <div class="inline-block bg-white p-4 rounded-3xl shadow-lg mb-4 rotate-3">
                        <span class="text-5xl">🚀</span>
                    </div>
                    <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500 mb-1">數位解碼任務</h1>
                    <p class="text-gray-500 font-bold">請輸入情報員基本資料</p>
                </div>
                <div class="space-y-4 text-left relative z-10">
                    <div>
                        <label class="block text-gray-600 font-bold mb-1 ml-1 text-sm">🏫 班級</label>
                        <input type="text" id="input-class" class="w-full input-cute p-3" placeholder="例如: 101">
                    </div>
                    <div>
                        <label class="block text-gray-600 font-bold mb-1 ml-1 text-sm">🪑 座號</label>
                        <input type="number" id="input-seat" class="w-full input-cute p-3" placeholder="例如: 05">
                    </div>
                    <div>
                        <label class="block text-gray-600 font-bold mb-1 ml-1 text-sm">📛 姓名</label>
                        <input type="text" id="input-name" class="w-full input-cute p-3" placeholder="輸入真實姓名">
                    </div>
                    <button id="btn-start" class="w-full mt-4 btn-game py-4 text-xl tracking-widest block">開始任務 START!</button>
                </div>
            </div>

            <!-- 排行榜卡片 -->
            <div class="glass-card p-6 h-full flex flex-col">
                <h3 class="text-xl font-bold text-gray-700 mb-4 flex items-center gap-2">
                    🏆 榮譽排行榜 (Top 10)
                </h3>
                <div id="leaderboard-container" class="leaderboard-scroll flex-grow">
                    <!-- 載入中狀態 -->
                    <div id="leaderboard-loading" class="flex flex-col items-center justify-center py-10 text-gray-400">
                        <div class="animate-spin text-3xl mb-2">🌀</div>
                        <p class="text-sm font-bold">同步情報中...</p>
                    </div>
                    <!-- 列表 -->
                    <table class="w-full text-left text-sm hidden" id="leaderboard-table">
                        <thead class="sticky top-0 bg-white/90">
                            <tr class="text-gray-400 border-b">
                                <th class="py-2 pl-2">名次</th>
                                <th class="py-2">情報員</th>
                                <th class="py-2 text-right pr-2">時間</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body" class="text-gray-600 font-bold">
                            <!-- 格式範例: <tr><td class="py-2">1</td><td>王小明</td><td class="text-right">02:30</td></tr> -->
                        </tbody>
                    </table>
                </div>
                <div class="mt-4 text-center">
                    <a href="https://docs.google.com/spreadsheets/d/1M5beg7mPqOypRTMDMQhQX6R48m1uhFzYgveF1Jpt_Dg/edit?usp=sharing" target="_blank" class="text-xs text-blue-500 hover:underline font-bold">
                        🔗 查看完整成績試算表
                    </a>
                </div>
            </div>
        </section>

        <!-- 關卡內容 (略，結構同前，僅保留邏輯掛載點) -->
        <section id="stage-1" class="w-full max-w-3xl hidden">
            <div class="glass-card p-8">
                <h2 class="text-2xl font-bold mb-4">第一關：二進位挑戰</h2>
                <div id="s1-content" class="text-center">
                    <p class="mb-4">目標數字：<span id="s1-target" class="text-4xl font-black text-blue-500">0</span></p>
                    <div id="bit-switches-container" class="flex justify-center gap-2 mb-4"></div>
                    <p>目前總和：<span id="s1-current" class="text-2xl font-bold">0</span></p>
                </div>
            </div>
        </section>

        <!-- 其餘關卡 2-7 的容器 (為簡化，此處僅示意其結構存在) -->
        <section id="stage-7" class="w-full max-w-3xl hidden">
            <div class="glass-card p-8 text-center">
                <h2 class="text-2xl font-bold mb-4">最後關卡：影片解碼</h2>
                <div class="video-container mb-4">
                    <iframe src="https://drive.google.com/file/d/1NQGA0c-130KV-wgRPYW7cTtsNdBZU9W3/preview"></iframe>
                </div>
                <input type="text" id="s7-input" class="input-cute p-3 w-full mb-4" placeholder="輸入影片密碼">
                <button id="btn-check-s7" class="btn-game px-8 py-3 w-full">完成任務</button>
            </div>
        </section>

        <section id="stage-result" class="w-full max-w-md glass-card p-8 text-center hidden border-4 border-yellow-300">
            <h1 class="text-4xl font-black text-pink-500 mb-4">任務達成！</h1>
            <p class="font-bold text-gray-600 mb-6">您的通關時間：<span id="res-time" class="text-2xl text-blue-500"></span></p>
            <p id="res-status" class="text-sm text-yellow-600 mb-6">成績同步中...</p>
            <button onclick="location.reload()" class="bg-gray-200 px-6 py-2 rounded-full font-bold">返回首頁</button>
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const config = {
                gasUrl: 'https://script.google.com/macros/s/AKfycbxRal62HC5AgmpL3t0mq-65D2oHXF8HNqtfRaGwdkL1cHi5FOQ1aA_ObhonqMO7quUw/exec'
            };

            const state = {
                classId: '', seat: '', name: '',
                startTime: null, totalSeconds: 0,
                currentStage: 0
            };

            const $ = id => document.getElementById(id);

            // --- 排行榜抓取功能 ---
            async function fetchLeaderboard() {
                try {
                    // GAS 需要實作 doGet 來回傳資料
                    const response = await fetch(`${config.gasUrl}?action=getLeaderboard`);
                    const data = await response.json();
                    renderLeaderboard(data);
                } catch (e) {
                    // 如果 GAS 尚未支援 action=getLeaderboard，則顯示模擬資料或清空
                    console.log("無法取得排行資料:", e);
                    $('leaderboard-loading').innerHTML = "暫無排行紀錄";
                }
            }

            function renderLeaderboard(data) {
                const body = $('leaderboard-body');
                body.innerHTML = '';
                if (!data || data.length === 0) {
                    $('leaderboard-loading').innerHTML = "虛位以待，快來挑戰！";
                    return;
                }

                data.slice(0, 10).forEach((entry, idx) => {
                    const row = document.createElement('tr');
                    row.className = "border-b border-gray-50 hover:bg-blue-50 transition";
                    row.innerHTML = `
                        <td class="py-3 pl-2">${idx + 1}</td>
                        <td class="py-3">${entry.name} <span class="text-[10px] text-gray-400 font-normal">(${entry.class})</span></td>
                        <td class="py-3 text-right pr-2 text-pink-500">${formatTime(entry.time)}</td>
                    `;
                    body.appendChild(row);
                });

                $('leaderboard-loading').classList.add('hidden');
                $('leaderboard-table').classList.remove('hidden');
            }

            // --- 初始化與基礎邏輯 ---
            function formatTime(sec) {
                const m = Math.floor(sec / 60).toString().padStart(2, '0');
                const s = (sec % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            }

            $('btn-start').onclick = () => {
                state.classId = $('input-class').value.trim();
                state.seat = $('input-seat').value.trim();
                state.name = $('input-name').value.trim();
                if(!state.classId || !state.seat || !state.name) return alert("請填寫資料！");
                
                state.startTime = Date.now();
                $('top-nav').classList.remove('hidden');
                $('nav-agent-name').textContent = state.name;
                setInterval(() => {
                    state.totalSeconds = Math.floor((Date.now() - state.startTime) / 1000);
                    $('nav-time').textContent = formatTime(state.totalSeconds);
                }, 1000);

                switchStage(1);
            };

            function switchStage(n) {
                document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
                const next = $(`stage-${n}`);
                if(next) next.classList.remove('hidden');
                state.currentStage = n;
                if(n === 1) initS1();
            }

            // --- 第一關簡化示範 ---
            let s1Target = 0;
            function initS1() {
                s1Target = Math.floor(Math.random() * 50) + 1;
                $('s1-target').textContent = s1Target;
                const container = $('bit-switches-container');
                container.innerHTML = '';
                [16, 8, 4, 2, 1].forEach(v => {
                    const btn = document.createElement('div');
                    btn.className = "bit-switch";
                    btn.dataset.val = v;
                    btn.innerHTML = `<div class="bit-led"></div>`;
                    btn.onclick = () => {
                        btn.classList.toggle('on');
                        checkS1();
                    };
                    container.appendChild(btn);
                });
            }

            function checkS1() {
                let sum = 0;
                document.querySelectorAll('.bit-switch.on').forEach(b => sum += parseInt(b.dataset.val));
                $('s1-current').textContent = sum;
                if(sum === s1Target) {
                    setTimeout(() => switchStage(7), 1000); // 跳到最後示範
                }
            }

            // --- 最後一關與資料上傳 ---
            $('btn-check-s7').onclick = () => {
                if($('s7-input').value.toLowerCase() === 'hint') {
                    switchStage('result');
                    $('res-time').textContent = formatTime(state.totalSeconds);
                    sendData();
                } else {
                    alert("密碼不對喔！");
                }
            };

            function sendData() {
                const payload = {
                    class: state.classId, seat: state.seat, name: state.name,
                    totalTime: state.totalSeconds
                };
                fetch(config.gasUrl, {
                    method: 'POST', mode: 'no-cors',
                    body: JSON.stringify(payload)
                }).then(() => {
                    $('res-status').textContent = "上傳成功！";
                    $('res-status').className = "text-green-500 font-bold";
                });
            }

            // 啟動時讀取排行榜
            fetchLeaderboard();
        });
    </script>
</body>
</html>
